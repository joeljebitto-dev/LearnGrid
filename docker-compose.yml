services:
  postgres:
    image: postgres:16-alpine
    container_name: learngrid-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-learngrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learngrid}
      POSTGRES_DB: learngrid
    ports:
      - "5432:5432"
    volumes:
      - learngrid_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learngrid} -d learngrid"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: learngrid-redis
    ports:
      - "6379:6379"
    volumes:
      - learngrid_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: learngrid-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-learngrid}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-learngrid-minio-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - learngrid_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: learngrid-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-learngrid} ${MINIO_ROOT_PASSWORD:-learngrid-minio-secret};
      mc mb -p local/${CONTENT_STORAGE_BUCKET:-learngrid-content} || true;
      mc anonymous set none local/${CONTENT_STORAGE_BUCKET:-learngrid-content} || true;
      "

  api-gateway:
    image: nginx:1.27-alpine
    container_name: learngrid-api-gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O- https://localhost:8443/gateway/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  learngrid_postgres_data:
  learngrid_redis_data:
  learngrid_minio_data:
