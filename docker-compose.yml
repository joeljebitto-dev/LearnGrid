services:
  postgres:
    image: postgres:16-alpine
    container_name: learngrid-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-learngrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learngrid}
      POSTGRES_DB: learngrid
    ports:
      - "5432:5432"
    volumes:
      - learngrid_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learngrid} -d learngrid"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: learngrid-redis
    ports:
      - "6379:6379"
    volumes:
      - learngrid_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: learngrid-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-learngrid}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-learngrid-minio-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - learngrid_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: learngrid-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-learngrid} ${MINIO_ROOT_PASSWORD:-learngrid-minio-secret};
      mc mb -p local/${CONTENT_STORAGE_BUCKET:-learngrid-content} || true;
      mc anonymous set none local/${CONTENT_STORAGE_BUCKET:-learngrid-content} || true;
      "

  kafka:
    image: apache/kafka:3.8.1
    container_name: learngrid-kafka
    ports:
      - "9092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: ${KAFKA_DEFAULT_PARTITIONS:-3}
    volumes:
      - learngrid_kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: apache/kafka:3.8.1
    container_name: learngrid-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_DEFAULT_PARTITIONS: ${KAFKA_DEFAULT_PARTITIONS:-3}
      KAFKA_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-1}
    command: >
      /bin/sh -c '
      topics="user.events course.events enrollment.events content.events progress.events assessment.events grading.events notification.events audit.events analytics.events";
      for topic in $$topics; do
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$$topic" --partitions "$$KAFKA_DEFAULT_PARTITIONS" --replication-factor "$$KAFKA_REPLICATION_FACTOR";
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$$topic.retry" --partitions "$$KAFKA_DEFAULT_PARTITIONS" --replication-factor "$$KAFKA_REPLICATION_FACTOR";
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$$topic.dlq" --partitions "$$KAFKA_DEFAULT_PARTITIONS" --replication-factor "$$KAFKA_REPLICATION_FACTOR";
      done
      '

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: learngrid-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: learngrid-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  api-gateway:
    image: nginx:1.27-alpine
    container_name: learngrid-api-gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O- https://localhost:8443/gateway/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  learngrid_postgres_data:
  learngrid_redis_data:
  learngrid_minio_data:
  learngrid_kafka_data:
