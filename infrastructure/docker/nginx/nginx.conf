worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format learngrid_json escape=json
        '{"time":"$time_iso8601","request_id":"$request_id","remote_addr":"$remote_addr",'
        '"method":"$request_method","uri":"$request_uri","status":$status,'
        '"bytes_sent":$bytes_sent,"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr","upstream_status":"$upstream_status"}';

    access_log /var/log/nginx/access.log learngrid_json;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    limit_req_zone $binary_remote_addr zone=learngrid_api:10m rate=30r/s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    map $http_origin $cors_origin {
        default "";
        "~^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$" $http_origin;
    }

    upstream frontend_service {
        server host.docker.internal:5173;
    }

    upstream auth_service {
        server host.docker.internal:8001;
    }

    upstream user_service {
        server host.docker.internal:8002;
    }

    upstream course_service {
        server host.docker.internal:8003;
    }

    upstream content_service {
        server host.docker.internal:8004;
    }

    upstream enrollment_service {
        server host.docker.internal:8005;
    }

    upstream progress_service {
        server host.docker.internal:8006;
    }

    upstream assessment_service {
        server host.docker.internal:8007;
    }

    upstream grading_service {
        server host.docker.internal:8008;
    }

    upstream notification_service {
        server host.docker.internal:8009;
    }

    upstream analytics_service {
        server host.docker.internal:8010;
    }

    server {
        listen 8080;
        server_name _;
        return 301 https://$host:8443$request_uri;
    }

    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/learngrid-local.crt;
        ssl_certificate_key /etc/nginx/certs/learngrid-local.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        add_header X-Request-ID $request_id always;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Request-ID" always;
        add_header Access-Control-Max-Age 3600 always;
        add_header Vary "Origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:*; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location = /gateway/health {
            default_type application/json;
            return 200 '{"service":"api-gateway","status":"ok"}';
        }

        location ~ ^/api/v1/(.*)$ {
            rewrite ^/api/v1/(.*)$ /api/$1 last;
        }

        location ^~ /api/auth/ {
            limit_req zone=learngrid_api burst=60 nodelay;
            proxy_pass http://auth_service;
        }

        location ^~ /api/users/ {
            limit_req zone=learngrid_api burst=60 nodelay;
            proxy_pass http://user_service;
        }

        location ^~ /api/courses/ {
            limit_req zone=learngrid_api burst=60 nodelay;
            proxy_pass http://course_service;
        }

        location ^~ /api/content/ {
            limit_req zone=learngrid_api burst=60 nodelay;
            proxy_pass http://content_service;
        }

        location ^~ /api/enrollments/ {
            limit_req zone=learngrid_api burst=60 nodelay;
            proxy_pass http://enrollment_service;
        }

        location ^~ /api/progress/ {
            limit_req zone=learngrid_api burst=60 nodelay;
            proxy_pass http://progress_service;
        }

        location ^~ /api/assessments/ {
            limit_req zone=learngrid_api burst=60 nodelay;
            proxy_pass http://assessment_service;
        }

        location ^~ /api/grading/ {
            limit_req zone=learngrid_api burst=60 nodelay;
            proxy_pass http://grading_service;
        }

        location ^~ /api/grades/ {
            limit_req zone=learngrid_api burst=60 nodelay;
            rewrite ^/api/grades/(.*)$ /api/grading/$1 break;
            proxy_pass http://grading_service;
        }

        location ^~ /api/notifications/ {
            limit_req zone=learngrid_api burst=60 nodelay;
            proxy_pass http://notification_service;
        }

        location ^~ /api/analytics/ {
            limit_req zone=learngrid_api burst=60 nodelay;
            proxy_pass http://analytics_service;
        }

        location / {
            proxy_pass http://frontend_service;
        }
    }
}
