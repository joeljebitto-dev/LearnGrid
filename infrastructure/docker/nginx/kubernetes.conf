events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json_combined escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr","request":"$request",'
        '"status":$status,"body_bytes_sent":$body_bytes_sent,"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time","request_id":"$request_id"}';

    access_log /dev/stdout json_combined;
    error_log /dev/stderr warn;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    client_max_body_size 20m;

    upstream frontend_service { server frontend-service:8080; }
    upstream auth_service { server auth-service:8000; }
    upstream user_service { server user-service:8000; }
    upstream course_service { server course-service:8000; }
    upstream content_service { server content-service:8000; }
    upstream enrollment_service { server enrollment-service:8000; }
    upstream progress_service { server progress-service:8000; }
    upstream assessment_service { server assessment-service:8000; }
    upstream grading_service { server grading-service:8000; }
    upstream notification_service { server notification-service:8000; }
    upstream analytics_service { server analytics-service:8000; }

    server {
        listen 8080;
        server_name _;

        add_header Vary "Origin" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        location = /gateway/health {
            access_log off;
            default_type application/json;
            return 200 '{"service":"api-gateway","status":"ok"}';
        }

        location /api/auth/ { proxy_pass http://auth_service/api/auth/; }
        location /api/users/ { proxy_pass http://user_service/api/users/; }
        location /api/courses/ { proxy_pass http://course_service/api/courses/; }
        location /api/content/ { proxy_pass http://content_service/api/content/; }
        location /api/enrollments/ { proxy_pass http://enrollment_service/api/enrollments/; }
        location /api/progress/ { proxy_pass http://progress_service/api/progress/; }
        location /api/assessments/ { proxy_pass http://assessment_service/api/assessments/; }
        location /api/grading/ { proxy_pass http://grading_service/api/grading/; }
        location /api/grades/ { proxy_pass http://grading_service/api/grading/; }
        location /api/notifications/ { proxy_pass http://notification_service/api/notifications/; }
        location /api/analytics/ { proxy_pass http://analytics_service/api/analytics/; }

        location / {
            proxy_pass http://frontend_service;
        }
    }
}
