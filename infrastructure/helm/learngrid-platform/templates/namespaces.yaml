    pod-security.kubernetes.io/enforce: {{ .Values.podSecurity.enforce | quote }}
    pod-security.kubernetes.io/audit: {{ .Values.podSecurity.audit | quote }}
    pod-security.kubernetes.io/warn: {{ .Values.podSecurity.warn | quote }}
