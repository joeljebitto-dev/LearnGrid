{{- if .Values.secrets.createPlaceholders }}
{{- range $name, $service := .Values.backendServices }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $service.secretName }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "learngrid.labels" $ | nindent 4 }}
type: Opaque
stringData:
  DJANGO_SECRET_KEY: REQUIRED_AT_DEPLOYMENT
  DATABASE_URL: REQUIRED_AT_DEPLOYMENT
  AUTH_JWT_SIGNING_KEY: REQUIRED_AT_DEPLOYMENT
  SENTRY_DSN: ""
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.frontend.secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: frontend-service
    {{- include "learngrid.labels" . | nindent 4 }}
type: Opaque
stringData:
  VITE_SENTRY_DSN: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.gateway.secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: api-gateway
    {{- include "learngrid.labels" . | nindent 4 }}
type: Opaque
stringData:
  GATEWAY_SECRET_PLACEHOLDER: REQUIRED_AT_DEPLOYMENT
{{- end }}
