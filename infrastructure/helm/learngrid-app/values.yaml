namespace: learngrid

image:
  registry: ghcr.io/learngrid/learngrid
  tag: latest
  pullPolicy: IfNotPresent

commonEnv:
  DJANGO_SETTINGS_MODULE: config.settings.production
  DJANGO_ALLOWED_HOSTS: learngrid.local
  CORS_ALLOWED_ORIGINS: https://learngrid.local
  CSRF_TRUSTED_ORIGINS: https://learngrid.local
  REDIS_URL: redis://learngrid-redis:6379/0
  REDIS_ENV: production
  KAFKA_ENABLED: "true"
  KAFKA_BOOTSTRAP_SERVERS: learngrid-kafka-bootstrap:9092
  AUTH_SERVICE_BASE_URL: http://auth-service:8000
  USER_SERVICE_BASE_URL: http://user-service:8000
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318/v1/traces
  SENTRY_ENVIRONMENT: production

backendDefaults:
  replicas: 2
  port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

backendServices:
  auth-service:
    image: auth-service
    serviceId: SVC-001
    secretName: auth-service-secrets
  user-service:
    image: user-service
    serviceId: SVC-002
    secretName: user-service-secrets
  course-service:
    image: course-service
    serviceId: SVC-003
    secretName: course-service-secrets
  content-service:
    image: content-service
    serviceId: SVC-004
    secretName: content-service-secrets
    env:
      CONTENT_MINIO_ENDPOINT_URL: http://minio:9000
      CONTENT_STORAGE_BUCKET: learngrid-content
  enrollment-service:
    image: enrollment-service
    serviceId: SVC-005
    secretName: enrollment-service-secrets
  progress-service:
    image: progress-service
    serviceId: SVC-006
    secretName: progress-service-secrets
  assessment-service:
    image: assessment-service
    serviceId: SVC-007
    secretName: assessment-service-secrets
  grading-service:
    image: grading-service
    serviceId: SVC-008
    secretName: grading-service-secrets
  notification-service:
    image: notification-service
    serviceId: SVC-009
    secretName: notification-service-secrets
  analytics-service:
    image: analytics-service
    serviceId: SVC-010
    secretName: analytics-service-secrets

frontend:
  image: frontend-service
  secretName: frontend-service-secrets
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

gateway:
  image: api-gateway
  secretName: api-gateway-secrets
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

ingress:
  enabled: true
  className: nginx
  host: learngrid.local
  tlsSecretName: learngrid-tls

autoscaling:
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

secrets:
  createPlaceholders: false
