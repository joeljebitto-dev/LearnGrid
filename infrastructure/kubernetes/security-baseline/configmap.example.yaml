apiVersion: v1
kind: ConfigMap
metadata:
  name: learngrid-production-config
  namespace: learngrid
data:
  DJANGO_SETTINGS_MODULE: "config.settings.production"
  DJANGO_ALLOWED_HOSTS: "api.example.edu,app.example.edu"
  CORS_ALLOWED_ORIGINS: "https://app.example.edu"
  CSRF_TRUSTED_ORIGINS: "https://app.example.edu"
  REDIS_ENV: "production"
  AUTH_JWT_ISSUER: "learngrid-auth-service"
  AUTH_JWT_ALGORITHM: "HS256"
  CONTENT_MALWARE_SCAN_ENABLED: "false"
